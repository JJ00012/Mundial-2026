{% extends "base.html" %}

{% block title %}Ingresar | PANINI DF{% endblock %}

{% block content %}
<section class="auth-card">
    <img class="auth-logo" src="{{ url_for('static', filename='panini-df-logo.png') }}" alt="Logo PANINI DF">
    <p class="eyebrow">PANINI DF</p>
    <h1>Ingresar</h1>
    <p class="help-text">Escribe tu usuario y contraseña para abrir tu álbum.</p>
    <form method="post" class="form">
        <label>Usuario
            <input type="text" name="username" autocomplete="username" required>
        </label>
        <label>Contraseña
            <input type="password" name="password" autocomplete="current-password" required>
        </label>
        <button class="button primary big-action" type="submit">Entrar a mi álbum</button>
    </form>
    <p class="muted">¿No tienes cuenta? <a href="{{ url_for('registro') }}">Crear cuenta nueva</a>.</p>
</section>
{% endblock %}
